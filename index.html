<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Libreria Casa</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">

  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<header>
  <h1>📚 Libreria Casa</h1>
  <p>Scannerizza e organizza i tuoi libri</p>
</header>

<main>

  <button id="scanBtn">📷 Scansiona ISBN</button>

  <div id="reader" style="display:none;"></div>

  <div id="bookInfo">
    Nessun libro selezionato
  </div>

  <input type="text" id="manualTitle" placeholder="Titolo libro">
  <input type="text" id="manualAuthor" placeholder="Autore">
  <input type="text" id="manualYear" placeholder="Anno">

  <button id="manualBtn">➕ Inserisci libro manualmente</button>

  <input
    type="text"
    id="posizione"
    placeholder="Es: Scaffale salotto">

  <button id="saveBtn">💾 Salva libro</button>

  <input
    type="text"
    id="search"
    placeholder="🔎 Cerca un libro">

  <div id="library"></div>

</main>

<script src="app.js"></script>

</body>
</html>
