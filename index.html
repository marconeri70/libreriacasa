<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Libreria Casa</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.webmanifest">

</head>

<body>

<header>

<h1>📚 Libreria Casa</h1>

<p>Scannerizza e organizza i tuoi libri</p>

</header>

<main>

<button id="scanBtn">

📷 Scansiona ISBN

</button>

<div id="bookInfo">

Nessun libro selezionato

</div>

<input
type="text"
id="posizione"
placeholder="Es: Scaffale salotto">

<button id="saveBtn">

💾 Salva libro

</button>

<input
type="text"
id="search"
placeholder="🔎 Cerca un libro">

<div id="library">

</div>

</main>

<script src="app.js"></script>

</body>

</html>
